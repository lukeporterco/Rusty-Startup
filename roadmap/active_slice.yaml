notes:
  - "This slice establishes the native-owned RuntimeContext model and runtime-input fingerprint contract as the first authority-spine foundation."
  - "Managed code may surface already-observable bootstrap and runtime facts into Rust, but it may not become the owner of package identity, mod identity, generalized content-root selection, or world-model truth."
  - "This slice consumes the stable self-package layout outputs from SLICE-002 and the stable bootstrap activation boundary from SLICE-003 without reopening those ownership boundaries."
  - "Fingerprinting must distinguish machine-local runtime or environment keys from portable or package-derived inputs and must surface unknown or unavailable inputs honestly."
  - "Parser mode must be explicit and fingerprinted, but this slice does not implement parser-lane semantics beyond the runtime-context contract."
  - "Proof surfaces for normalization and fingerprint behavior are in scope under native/tests and evals."
  - "Do not introduce generalized multi-mod package resolution, deterministic modset modeling, raw XML discovery, snapshot storage, replay, equivalence, or mixed-zone execution planning in this slice."