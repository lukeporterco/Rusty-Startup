version: 1
active_slice: "SLICE-003-rimworld-shell-activation-and-rust-core-bootstrap"
stage: "stage-1"
working_directory: "managed"
notes:
  - "This slice activates RimWorld startup entry through the thin managed shell and boots the Rust core from the already-resolved rustystartup.core package layout."
  - "The shell remains a narrow bootstrap and native-boundary layer only; it may capture environment state, resolve native load paths, validate ABI compatibility, and hand off startup into Rust."
  - "This slice also makes the repository itself a canonical local rustystartup.core test package with deterministic package-relative artifact placement for current-machine RimWorld startup testing."
  - "Bootstrap diagnostics must expose startup entry status, package identity, selected content root, managed assembly path, native load path, ABI handshake status, Rust-core activation status, packaging status, and any fallback or failure reason."
  - "The Rust core remains the semantic owner through the cutoff; no snapshot, replay, equivalence, XML discovery, or mixed-zone ownership is introduced here."
  - "This slice builds on the stable self-package layout inputs established by the previous slice and should not re-open package-root or LoadFolders resolution as a new semantic boundary."
  - "Keep package identity locked to rustystartup.core."
  - "Activation and packaging failures must be explicit and explainable rather than silently degraded."
  - "Do not hardcode a machine-specific RimWorld Mods path; the repo-local package surface is in scope, but external install linkage is not part of the semantic contract."